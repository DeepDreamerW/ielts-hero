<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>词汇对拼 - 雅思英雄</title>
    <link rel="stylesheet" href="style.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }
        .game-box {
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 30px;
            width: 420px;
            backdrop-filter: blur(10px);
        }

        /* 血条样式 */
        .hp-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        .hp-label { font-size: 14px; color: #aaa; }
        .hp-track {
            width: 150px;
            height: 16px;
            background: #333;
            border-radius: 10px;
            overflow: hidden;
            margin-top: 5px;
        }
        .hp-fill {
            height: 100%;
            border-radius: 10px;
            transition: width 0.5s;
        }
        .hp-fill.player { background: linear-gradient(to right, #00c853, #64dd17); }
        .hp-fill.enemy { background: linear-gradient(to right, #ff1744, #ff5252); }

        /* 题目区 */
        .question-area {
            text-align: center;
            margin: 20px 0;
        }
        .question-area h3 {
            color: #ffd200;
            margin-bottom: 15px;
        }
        .sentence {
            font-size: 16px;
            line-height: 1.8;
            color: #ddd;
        }

        /* 选项按钮 */
        .options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 20px;
        }
        .opt-btn {
            padding: 12px;
            border: 2px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.05);
            color: white;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .opt-btn:hover {
            background: rgba(247, 151, 30, 0.3);
            border-color: #f7971e;
        }
        .opt-btn.correct {
            background: rgba(0, 200, 83, 0.4);
            border-color: #00c853;
        }
        .opt-btn.wrong {
            background: rgba(255, 23, 68, 0.4);
            border-color: #ff1744;
        }

        /* 计时器 */
        .timer {
            text-align: center;
            font-size: 28px;
            color: #ffd200;
            margin: 10px 0;
        }

        /* 得分 */
        .score-area {
            text-align: center;
            margin-top: 15px;
            color: #aaa;
        }
    </style>
</head>
<body>
    <div class="game-box">
        <!-- 血条区域 -->
        <div class="hp-bar">
            <div id="buffBar" style="
                text-align: center;
                font-size: 12px;
                color: #64dd17;
                margin-bottom: 10px;
                min-height: 16px;
            "></div>
            <div>
                <span class="hp-label">🧑 你</span>
                <div class="hp-track">
                    <div class="hp-fill player" id="playerHp" style="width:100%"></div>
                </div>
            </div>
            <div style="text-align:right">
                <span class="hp-label" id="enemyName">🤖 对手</span>
                <div class="hp-track">
                    <div class="hp-fill enemy" id="enemyHp" style="width:100%"></div>
                </div>
            </div>
        </div>

        <!-- 计时器 -->
        <div class="timer">⏱️ <span id="timeLeft">10</span>s</div>

        <!-- 题目 -->
        <div class="question-area">
            <h3 id="questionTitle">第 1 题</h3>
            <p class="sentence" id="questionText">加载中...</p>
        </div>

        <!-- 选项 -->
        <div class="options" id="optionsBox">
            <!-- 动态生成 -->
        </div>

        <!-- 得分 -->
        <div class="score-area">
            ⭐ 得分：<span id="score">0</span> 分 | 
            🔥 连击：<span id="combo">0</span>
        </div>
    </div>
    <script src="wordbank.js"></script> 
    <script src="effects.js"></script>
    <script src="rank.js"></script>
    <script src="sound.js"></script>
    <script src="ai.js"></script>
    <script src="buff.js"></script>
    <script src="tutorial.js"></script>
    <script>
        // ===== 根据玩家段位加载匹配难度的题目 =====
        const playerData = JSON.parse(localStorage.getItem('ieltsHeroData') || '{}');
        const playerScore = playerData.score || 0;
        const wordBank = getMatchedQuestions(playerScore, 10);
        const diffRange = getDifficultyForScore(playerScore);
        // ============================================
        //   🎮 游戏状态
        // ============================================
        // ===== AI对手 =====
        const aiOpponent = getAIOpponent(playerScore);
        let playerHP = 100;
        let enemyHP = 100;
        let score = 0;
        let combo = 0;
        let currentQuestion = 0;
        let timeLeft = 10;
        let timer = null;
        let canAnswer = true;
        // ===== 计算植物BUFF =====
        const activeBuffs = calculateTotalBuffs();
        const BASE_TIME = 10; // 基础答题时间
        const TOTAL_TIME = BASE_TIME + activeBuffs.extraTime; // 加上BUFF时间

        // ============================================
        //   🔧 游戏函数
        // ============================================
        // ===== 随机打乱题库 =====
        
        // 加载题目
        function loadQuestion() {
            if (currentQuestion === 0) {
                showTutorial('battle', () => {
                // 引导结束后开始计时
                timeLeft = TOTAL_TIME;
                document.getElementById('timeLeft').textContent = timeLeft;
                clearInterval(timer);
                timer = setInterval(countdown, 1000);
            });
            // 如果是第一次玩，先不启动计时器
                const viewedKey = 'ieltsHero_tutorial_battle';
                if (localStorage.getItem(viewedKey) !== 'done') {
                    return; // 等引导结束再加载
                }
            }
            if (currentQuestion === 0) {
                // 显示BUFF信息
                const buffDescs = getBuffDescription(activeBuffs);
                if (buffDescs.length > 0) {
                    document.getElementById('buffBar').textContent = 
                    '🌱 植物加成：' + buffDescs.join(' | ');
                }
            }
            // 显示AI对手信息（第一题时）
            if (currentQuestion === 0) {
                document.getElementById('enemyName').textContent = 
                `${aiOpponent.emoji} ${aiOpponent.name}`;
            }
            if (currentQuestion >= wordBank.length) {
                endGame();
                return;
            }

            canAnswer = true;
            const q = wordBank[currentQuestion];

            document.getElementById('questionTitle').textContent = `第 ${currentQuestion + 1} 题`;
            document.getElementById('questionText').textContent = q.sentence;
            document.getElementById('questionTitle').textContent = 
             `第 ${currentQuestion + 1}/${wordBank.length} 题 ${getDifficultyStars(q.difficulty)}`;

            const optionsBox = document.getElementById('optionsBox');
            optionsBox.innerHTML = '';

            q.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = `opt-btn animated-entry-delay-${index + 1}`;
                btn.textContent = opt;
                btn.onclick = () => selectAnswer(index);
                optionsBox.appendChild(btn);
            });

            // 重置计时器
            timeLeft = TOTAL_TIME;
            document.getElementById('timeLeft').textContent = timeLeft;
            clearInterval(timer);
            timer = setInterval(countdown, 1000);
        }

        // 倒计时
        function countdown() {
            timeLeft--;
            document.getElementById('timeLeft').textContent = timeLeft;
            // 🔊 倒计时音效
            if (timeLeft <= 3 && timeLeft > 0) {
                Sound.urgentTick();
            } else if (timeLeft > 3) {
                 Sound.tick();
            }

            if (timeLeft <= 0) {
                clearInterval(timer);
                selectAnswer(-1); // 超时算错
            }
        }

        // 选择答案
        function selectAnswer(choice) {
            if (!canAnswer) return;
            canAnswer = false;
            clearInterval(timer);

            const q = wordBank[currentQuestion];
            const buttons = document.querySelectorAll('.opt-btn');

            // 显示正确答案（绿色）
            buttons[q.answer].classList.add('correct');

            if (choice === q.answer) {
                // ✅ 答对了！
                Sound.correct();
                let damage = 10 + timeLeft * 2 + combo * 3; // 速度越快伤害越高
                // 🌱 应用植物BUFF：得分加成
                damage = Math.round(damage * (1 + activeBuffs.scoreBonus));
                enemyHP = Math.max(0, enemyHP - damage);
                combo++;
                score += damage;
                // ✨ 特效！
                flashScreen(true);
                showDamageNumber(
                    window.innerWidth * 0.65,
                    120,
                    `-${damage}`,
                    'hit'
                );
                if (combo >= 3) {
                    showComboEffect(combo);
                    Sound.combo(combo);
                    
                }

                // 显示反馈
                document.getElementById('questionTitle').textContent = 
                    `✅ 正确！伤害 ${damage} 🔥 连击x${combo}`;
            } else {
                // ❌ 答错了
                Sound.wrong();
                // 答错时
                const damageReceived = Math.max(5, 15 - activeBuffs.reduceDamage);
                playerHP = Math.max(0, playerHP - damageReceived);
                if (choice >= 0) buttons[choice].classList.add('wrong');

                combo = 0;
                // ✨ 特效！
                flashScreen(false);
                shakeElement(document.querySelector('.game-box'));
                showDamageNumber(
                    window.innerWidth * 0.2,
                    120,
                    `-15`,
                    'hit'
                );
                // 答错时显示 tip
                document.getElementById('questionTitle').textContent =
                `❌ ${q.options[q.answer]} → ${q.tip}`;
            }

            // 更新UI
            updateUI();

            // 检查是否有人血量归零
            if (playerHP <= 0 || enemyHP <= 0) {
                setTimeout(endGame, 1500);
                return;
            }

            // 模拟对手答题（AI）
            // 🤖 AI对手答题
            setTimeout(() => {
                const aiResult = aiAnswer(aiOpponent);
                if (aiResult.correct) {
                    // AI答对了，计算AI的伤害
                    let aiDamage = 8 + Math.round((10 - aiResult.time) * 2);
                    playerHP = Math.max(0, playerHP - aiDamage);

                    // 显示AI伤害飘字
                    showDamageNumber(
                        window.innerWidth * 0.2,
                        80,
                        `-${aiDamage}`,
                        'hit'
                    );
                    updateUI();

                    if (playerHP <= 0) {
                        setTimeout(endGame, 1000);
                    }
                }
            }, 500);

            // 1.5秒后下一题
            currentQuestion++;
            setTimeout(loadQuestion, 1500);
        }

        // 更新界面
        function updateUI() {
            document.getElementById('playerHp').style.width = playerHP + '%';
            document.getElementById('enemyHp').style.width = enemyHP + '%';
            document.getElementById('score').textContent = score;
            document.getElementById('combo').textContent = combo;
        }

        // 游戏结束
        function endGame() {
            clearInterval(timer);
            const won = enemyHP <= 0 || playerHP > enemyHP;
            // ✨ 胜利/失败特效
            if (won) {
                Sound.victory();
                showVictoryParticles();
            } else {
                Sound.defeat();
                showDefeatEffect();
            }
            const box = document.querySelector('.game-box');
            // ===== 💾 保存成绩到本地存档 =====
            let data = JSON.parse(localStorage.getItem('ieltsHeroData') || '{}');
            const oldRankName = data.rank || '';
            data.score = (data.score || 0) + score;
            data.totalGames = (data.totalGames || 0) + 1;
            // 📜 记录战绩历史
            let history = JSON.parse(localStorage.getItem('ieltsHeroBattleHistory') || '[]');
            history.push({
                date: new Date().toLocaleDateString(),
                score: score,
                won: won,
                playerHP: playerHP,
                enemyHP: enemyHP
            });
            // 只保留最近50条
            if (history.length > 50) history = history.slice(-50);
            localStorage.setItem('ieltsHeroBattleHistory', JSON.stringify(history));
            // 每赢一局获得种子奖励
            if (won) {
                data.totalWins = (data.totalWins || 0) + 1;
                data.seeds = (data.seeds || 0) + 5;
                data.fertilizer = (data.fertilizer || 0) + 2;
            }
            localStorage.setItem('ieltsHeroData', JSON.stringify(data));
            // 🏅 检查段位变化
            const newRank = updateRank();
            const newRankFullName = newRank.icon + " " + newRank.name;
            // 延迟显示结算画面
            setTimeout(() => {
                const box = document.querySelector('.game-box');
                box.innerHTML = `
                <div class="animated-entry" style="text-align:center; padding:30px 0;">
                    <h1 style="font-size:48px; margin-bottom:15px;">
                        ${won ? '🏆 胜利！' : '💀 失败...'}
                    </h1>
                     <p class="animated-entry-delay-1" style="font-size:20px; color:#ffd200; margin-bottom:5px;">
                        本局得分：${score} 分
                    </p>
                    <p class="animated-entry-delay-2" style="color:#aaa; margin-bottom:5px;">
                        你的血量：${playerHP}% | 对手血量：${enemyHP}%
                    </p>
                    <p class="animated-entry-delay-3" style="color:#64dd17; margin-bottom:5px;">
                        ${won ? '🌱 获得种子 x5 | 💧 获得肥料 x2' : '继续加油！'}
                    </p>
                     <p class="animated-entry-delay-3" style="color:${newRank.color}; margin-bottom:20px;">
                        段位：${newRank.icon} ${newRank.name}
                    </p>
                    <div class="animated-entry-delay-4" style="display:grid; gap:10px;">
                        <button class="opt-btn" onclick="location.reload()"
                            style="padding:14px; font-size:16px; border-color:#ffd200;">
                            🔄 再来一局
                        </button>
                        <button class="opt-btn" onclick="location.href='plant.html'"
                            style="padding:14px; font-size:16px; border-color:#64dd17;">
                            🌱 去花园看看
                        </button>
                        <button class="opt-btn" onclick="location.href='index.html'"
                            style="padding:14px; font-size:16px; border-color:#aaa;">
                            🏠 返回首页
                        </button>
                    </div>
                </div>
                `;
                // 如果段位提升了，显示段位提升特效
                if (oldRankName !== newRankFullName && oldRankName !== '') {
                    setTimeout(() => showRankUpEffect(oldRankName, newRank), 1000);
                }
            }, 500);
            setTimeout(() => checkAndShowAchievements(), 2000);
            syncMyScore(); // 同步到在线排行榜
        }
        

        // ============================================
        //   🚀 启动游戏！
        // ============================================
        loadQuestion(); 
    </script>
    <script src="achievements.js"></script>
    <script src="leaderboard.js"></script>
</body>
</html>
