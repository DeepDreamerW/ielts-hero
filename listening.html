<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>听力模式 - 雅思英雄</title>
    <link rel="stylesheet" href="style.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a237e, #283593, #1a237e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }
        .game-box {
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 30px;
            width: 420px;
            backdrop-filter: blur(10px);
        }
        .mode-title {
            text-align: center;
            color: #82b1ff;
            font-size: 14px;
            margin-bottom: 15px;
        }
        .hp-bar { display: flex; justify-content: space-between; margin-bottom: 15px; }
        .hp-label { font-size: 14px; color: #aaa; }
        .hp-track { width: 150px; height: 16px; background: #333; border-radius: 10px; overflow: hidden; margin-top: 5px; }
        .hp-fill { height: 100%; border-radius: 10px; transition: width 0.5s; }
        .hp-fill.player { background: linear-gradient(to right, #00c853, #64dd17); }
        .hp-fill.enemy { background: linear-gradient(to right, #ff1744, #ff5252); }

        .timer { text-align: center; font-size: 24px; color: #82b1ff; margin: 8px 0; }

        .listen-area {
            text-align: center;
            margin: 20px 0;
        }

        .play-btn {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #536dfe, #2979ff);
            border: none;
            cursor: pointer;
            font-size: 36px;
            color: white;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(83, 109, 254, 0.4);
        }
        .play-btn:hover { transform: scale(1.1); }
        .play-btn:active { transform: scale(0.95); }
        .play-btn.playing {
            animation: pulse 1s infinite;
            box-shadow: 0 4px 25px rgba(83, 109, 254, 0.7);
        }

        .hint-text {
            color: #aaa;
            font-size: 13px;
            margin-top: 10px;
        }

        .question-info {
            text-align: center;
            color: #82b1ff;
            margin-bottom: 10px;
        }

        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .opt-btn {
            padding: 14px 10px;
            border: 2px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.05);
            color: white;
            border-radius: 10px;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .opt-btn:hover { background: rgba(83,109,254,0.3); border-color: #536dfe; }
        .opt-btn.correct { background: rgba(0,200,83,0.4); border-color: #00c853; }
        .opt-btn.wrong { background: rgba(255,23,68,0.4); border-color: #ff1744; }

        .score-area { text-align: center; margin-top: 12px; color: #aaa; font-size: 14px; }

        @media screen and (max-width: 480px) {
            .game-box { width: 100%; padding: 20px 15px; }
            .options { grid-template-columns: 1fr; }
            .opt-btn { padding: 14px; font-size: 16px; min-height: 50px; }
        }
    </style>
</head>
<body>
    <div class="game-box">
        <div class="mode-title">🎧 听力模式</div>

        <div class="hp-bar">
            <div>
                <span class="hp-label">🧑 你</span>
                <div class="hp-track"><div class="hp-fill player" id="playerHp" style="width:100%"></div></div>
            </div>
            <div style="text-align:right">
                <span class="hp-label" id="enemyName">🤖 对手</span>
                <div class="hp-track"><div class="hp-fill enemy" id="enemyHp" style="width:100%"></div></div>
            </div>
        </div>

        <div class="timer">⏱️ <span id="timeLeft">12</span>s</div>

        <!-- 播放区域 -->
        <div class="listen-area">
            <div class="question-info" id="questionInfo">第 1 题</div>
            <button class="play-btn" id="playBtn" onclick="playWord()">🔊</button>
            <p class="hint-text" id="hintText">点击播放，听发音选择正确的单词</p>
        </div>

        <!-- 选项 -->
        <div class="options" id="optionsBox"></div>

        <div class="score-area">
            ⭐ 得分：<span id="score">0</span> |
            🔥 连击：<span id="combo">0</span>
        </div>
    </div>

    <script src="rank.js"></script>
    <script src="effects.js"></script>
    <script src="sound.js"></script>
    <script src="ai.js"></script>
    <script src="buff.js"></script>
    <script>
    // ============================================
    //   🎧 听力模式题库
    // ============================================
    const listeningBank = [
        {
            word: "phenomenon",
            phonetic: "/fəˈnɒmɪnən/",
            meaning: "现象",
            options: ["phenomenon", "philosophy", "photography", "pharmacy"],
            answer: 0,
            difficulty: 3
        },
        {
            word: "environment",
            phonetic: "/ɪnˈvaɪrənmənt/",
            meaning: "环境",
            options: ["environment", "entertainment", "employment", "equipment"],
            answer: 0,
            difficulty: 2
        },
        {
            word: "approximately",
            phonetic: "/əˈprɒksɪmətli/",
            meaning: "大约",
            options: ["approximately", "appropriately", "appreciatively", "apprehensively"],
            answer: 0,
            difficulty: 3
        },
        {
            word: "sufficient",
            phonetic: "/səˈfɪʃənt/",
            meaning: "足够的",
            options: ["sufficient", "efficient", "proficient", "deficient"],
            answer: 0,
            difficulty: 3
        },
        {
            word: "government",
            phonetic: "/ˈɡʌvənmənt/",
            meaning: "政府",
            options: ["government", "development", "movement", "improvement"],
            answer: 0,
            difficulty: 1
        },
        {
            word: "significant",
            phonetic: "/sɪɡˈnɪfɪkənt/",
            meaning: "重要的，显著的",
            options: ["significant", "magnificent", "sufficient", "efficient"],
            answer: 0,
            difficulty: 3
        },
        {
            word: "technology",
            phonetic: "/tekˈnɒlədʒi/",
            meaning: "技术",
            options: ["technology", "psychology", "archaeology", "methodology"],
            answer: 0,
            difficulty: 2
        },
        {
            word: "consequence",
            phonetic: "/ˈkɒnsɪkwəns/",
            meaning: "结果，后果",
            options: ["consequence", "conference", "confidence", "competence"],
            answer: 0,
            difficulty: 3
        },
        {
            word: "particularly",
            phonetic: "/pəˈtɪkjʊləli/",
            meaning: "特别地",
            options: ["particularly", "practically", "partially", "potentially"],
            answer: 0,
            difficulty: 3
        },
        {
            word: "opportunity",
            phonetic: "/ˌɒpəˈtjuːnəti/",
            meaning: "机会",
            options: ["opportunity", "community", "university", "possibility"],
            answer: 0,
            difficulty: 2
        },
        {
            word: "controversial",
            phonetic: "/ˌkɒntrəˈvɜːʃəl/",
            meaning: "有争议的",
            options: ["controversial", "conventional", "confidential", "consequential"],
            answer: 0,
            difficulty: 4
        },
        {
            word: "deteriorate",
            phonetic: "/dɪˈtɪəriəreɪt/",
            meaning: "恶化",
            options: ["deteriorate", "demonstrate", "deliberate", "decorate"],
            answer: 0,
            difficulty: 5
        },
    ];

    // 打乱题库
    for (let i = listeningBank.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [listeningBank[i], listeningBank[j]] = [listeningBank[j], listeningBank[i]];
    }

    // ============================================
    //   🎮 游戏状态
    // ============================================
    let playerHP = 100;
    let enemyHP = 100;
    let score = 0;
    let combo = 0;
    let currentQuestion = 0;
    let timeLeft = 12;
    let timer = null;
    let canAnswer = true;
    let hasPlayed = false; // 是否已播放过

    const playerData = JSON.parse(localStorage.getItem('ieltsHeroData') || '{}');
    const aiOpponent = getAIOpponent(playerData.score || 0);
    const activeBuffs = calculateTotalBuffs();
    const BASE_TIME = 12;
    const TOTAL_TIME = BASE_TIME + activeBuffs.extraTime;

    // ============================================
    //   🔊 使用浏览器TTS播放单词发音
    // ============================================
    function playWord() {
        if (currentQuestion >= listeningBank.length) return;

        const q = listeningBank[currentQuestion];
        const utterance = new SpeechSynthesisUtterance(q.word);
        utterance.lang = 'en-US';
        utterance.rate = 0.8; // 稍微慢一点

        const btn = document.getElementById('playBtn');
        btn.classList.add('playing');
        utterance.onend = () => {
            btn.classList.remove('playing');
        };

        window.speechSynthesis.cancel(); // 取消之前的
        window.speechSynthesis.speak(utterance);
        hasPlayed = true;

        document.getElementById('hintText').textContent = 
            `已播放 · 再次点击可重听 · ${q.meaning}`;
    }

    // ============================================
    //   🎮 游戏逻辑
    // ============================================
    function loadQuestion() {
        if (currentQuestion >= listeningBank.length) {
            endGame();
            return;
        }

        canAnswer = true;
        hasPlayed = false;
        const q = listeningBank[currentQuestion];

        document.getElementById('questionInfo').textContent = 
            `第 ${currentQuestion + 1}/${listeningBank.length} 题 ${'⭐'.repeat(q.difficulty)}`;
        document.getElementById('hintText').textContent = 
            `点击 🔊 播放发音 · 提示：${q.meaning}`;

        document.getElementById('playBtn').classList.remove('playing');

        // 生成选项（打乱顺序）
        let shuffledOptions = q.options.map((opt, idx) => ({ text: opt, isCorrect: idx === q.answer }));
        for (let i = shuffledOptions.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffledOptions[i], shuffledOptions[j]] = [shuffledOptions[j], shuffledOptions[i]];
        }

        const optionsBox = document.getElementById('optionsBox');
        optionsBox.innerHTML = '';
        shuffledOptions.forEach((opt, index) => {
            const btn = document.createElement('button');
            btn.className = `opt-btn animated-entry-delay-${index + 1}`;
            btn.textContent = opt.text;
            btn.onclick = () => selectAnswer(btn, opt.isCorrect, q);
            optionsBox.appendChild(btn);
        });

        // 计时器
        timeLeft = TOTAL_TIME;
        document.getElementById('timeLeft').textContent = timeLeft;
        clearInterval(timer);
        timer = setInterval(countdown, 1000);

        // 显示AI对手名
        if (currentQuestion === 0) {
            document.getElementById('enemyName').textContent = 
                `${aiOpponent.emoji} ${aiOpponent.name}`;
        }
    }

    function countdown() {
        timeLeft--;
        document.getElementById('timeLeft').textContent = timeLeft;
        if (timeLeft <= 3 && timeLeft > 0) Sound.urgentTick();
        else if (timeLeft > 3) Sound.tick();
        if (timeLeft <= 0) {
            clearInterval(timer);
            autoFail();
        }
    }

    function autoFail() {
        if (!canAnswer) return;
        canAnswer = false;
        playerHP = Math.max(0, playerHP - 15);
        combo = 0;
        flashScreen(false);
        updateUI();

        const q = listeningBank[currentQuestion];
        document.getElementById('hintText').textContent = 
            `⏰ 超时！正确答案：${q.word} (${q.meaning})`;

        // 标记正确答案
        document.querySelectorAll('.opt-btn').forEach(btn => {
            if (btn.textContent === q.word) btn.classList.add('correct');
        });

        currentQuestion++;
        setTimeout(loadQuestion, 2000);
    }

    function selectAnswer(btn, isCorrect, q) {
        if (!canAnswer) return;
        canAnswer = false;
        clearInterval(timer);

        // 高亮正确答案
        document.querySelectorAll('.opt-btn').forEach(b => {
            if (b.textContent === q.word) b.classList.add('correct');
        });

        if (isCorrect) {
            Sound.correct();
            flashScreen(true);
            let damage = 10 + timeLeft * 2 + combo * 3;
            damage = Math.round(damage * (1 + activeBuffs.scoreBonus));
            enemyHP = Math.max(0, enemyHP - damage);
            combo++;
            score += damage;

            showDamageNumber(window.innerWidth * 0.65, 100, `-${damage}`, 'hit');
            if (combo >= 3) { showComboEffect(combo); Sound.combo(combo); }

            document.getElementById('hintText').textContent = 
                `✅ 正确！${q.word} = ${q.meaning} | 伤害 ${damage}`;
        } else {
            Sound.wrong();
            flashScreen(false);
            btn.classList.add('wrong');
            let damageReceived = Math.max(5, 15 - activeBuffs.reduceDamage);
            playerHP = Math.max(0, playerHP - damageReceived);
            combo = 0;
            shakeElement(document.querySelector('.game-box'));

            document.getElementById('hintText').textContent = 
                `❌ 正确答案：${q.word} = ${q.meaning}`;
        }

        updateUI();

        if (playerHP <= 0 || enemyHP <= 0) {
            setTimeout(endGame, 1500);
            return;
        }

        // AI答题
        setTimeout(() => {
            const aiResult = aiAnswer(aiOpponent);
            if (aiResult.correct) {
                let aiDmg = 8 + Math.round((10 - aiResult.time) * 2);
                playerHP = Math.max(0, playerHP - aiDmg);
                showDamageNumber(window.innerWidth * 0.2, 80, `-${aiDmg}`, 'hit');
                updateUI();
                if (playerHP <= 0) setTimeout(endGame, 1000);
            }
        }, 500);

        currentQuestion++;
        setTimeout(loadQuestion, 2000);
    }

    function updateUI() {
        document.getElementById('playerHp').style.width = playerHP + '%';
        document.getElementById('enemyHp').style.width = enemyHP + '%';
        document.getElementById('score').textContent = score;
        document.getElementById('combo').textContent = combo;
    }

    function endGame() {
        clearInterval(timer);
        const won = enemyHP <= 0 || playerHP > enemyHP;

        if (won) { showVictoryParticles(); Sound.victory(); } 
        else { showDefeatEffect(); Sound.defeat(); }

        // 保存数据
        let data = JSON.parse(localStorage.getItem('ieltsHeroData') || '{}');
        data.score = (data.score || 0) + score;
        data.totalGames = (data.totalGames || 0) + 1;
        if (won) {
            data.totalWins = (data.totalWins || 0) + 1;
            data.seeds = (data.seeds || 0) + 5;
            data.fertilizer = (data.fertilizer || 0) + 2;
        }
        localStorage.setItem('ieltsHeroData', JSON.stringify(data));
        updateRank();

        // 记录战绩
        let history = JSON.parse(localStorage.getItem('ieltsHeroBattleHistory') || '[]');
        history.push({
            date: new Date().toLocaleDateString(),
            score: score, won: won, mode: '听力模式',
            playerHP: playerHP, enemyHP: enemyHP
        });
        if (history.length > 50) history = history.slice(-50);
        localStorage.setItem('ieltsHeroBattleHistory', JSON.stringify(history));

        setTimeout(() => {
            const box = document.querySelector('.game-box');
            box.innerHTML = `
                <div class="animated-entry" style="text-align:center; padding:25px 0;">
                    <h1 style="font-size:48px; margin-bottom:15px;">
                        ${won ? '🏆 胜利！' : '💀 失败...'}
                    </h1>
                    <p style="font-size:20px; color:#82b1ff;">本局得分：${score}</p>
                    <p style="color:#aaa;">你 ${playerHP}% | 对手 ${enemyHP}%</p>
                    <p style="color:#64dd17; margin:10px 0;">
                        ${won ? '🌱 种子+5 💧 肥料+2' : '继续加油！'}
                    </p>
                    <div style="display:grid; gap:10px; margin-top:20px;">
                        <button class="opt-btn" onclick="location.reload()"
                            style="padding:14px; border-color:#82b1ff;">🔄 再来一局</button>
                        <button class="opt-btn" onclick="location.href='game.html'"
                            style="padding:14px; border-color:#ffd200;">⚔️ 词汇对拼</button>
                        <button class="opt-btn" onclick="location.href='index.html'"
                            style="padding:14px; border-color:#aaa;">🏠 返回首页</button>
                    </div>
                </div>
            `;
        }, 500);
        setTimeout(() => checkAndShowAchievements(), 2000);
    }

    // 🚀 启动！
    loadQuestion();
    </script>
    <script src="achievements.js"></script>
</body>
</html>
